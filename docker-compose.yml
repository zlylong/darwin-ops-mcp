services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      OPS_MCP_ADDR: ":8080"
      OPS_MCP_MODE: "mock"
      OPS_MCP_ENV: "development"
      OPS_MCP_SEED_MOCK: "true"
      DATABASE_URL: "postgres://ops_mcp:ops_mcp@postgres:5432/ops_mcp?sslmode=disable"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ops_mcp
      POSTGRES_PASSWORD: ops_mcp
      POSTGRES_DB: ops_mcp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ops_mcp -d ops_mcp"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
